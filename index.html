            text-align: center;

        }

            text-transform: uppercase;

            letter-spacing: 1px;

        .preco-final {

    <input type="text" id="preco" inputmode="decimal" placeholder="0,00" autocomplete="off" aria-label="Preço Original" onclick="this.select()" oninput="validarPreco(this)">

    <label for="desconto" id="label-desconto">Desconto (%)</label>
    <input type="text" id="desconto" inputmode="decimal" placeholder="Ex: 20" autocomplete="off" aria-label="Desconto" onclick="this.select()" oninput="validarDesconto(this)">

    <button id="btnCalcular" aria-label="Calcular preço">CALCULAR</button>
    <button id="btnLimpar" aria-label="Limpar campos">LIMPAR</button>

    <div id="resultado-box">

        <div class="preco-final" id="res-valor">0,00 €</div>

const fallbackPorIdioma = {
    en: "en-US",
    pt: "pt-PT",
    es: "es-ES",
    fr: "fr-FR",
    de: "de-DE",
    it: "it-IT",
    nl: "nl-NL",
    pl: "pl-PL",
    ro: "ro-RO",
    ja: "ja-JP",
    zh: "zh-CN"
};

function obterTraducao(langCode) {
    if (dicionario[langCode]) return dicionario[langCode];
    const baseLang = langCode.split('-')[0];
    const fallback = fallbackPorIdioma[baseLang];
    if (fallback && dicionario[fallback]) return dicionario[fallback];
    return dicionario["pt-PT"];
}

function aplicarIdioma() {
    const lang = navigator.language || 'pt-PT';
    const trad = obterTraducao(lang);

    document.getElementById("titulo-principal").innerText = trad.titulo;
    document.getElementById("label-preco").innerText = trad.labelPreco;
    document.getElementById("preco").placeholder = trad.placeholderPreco;
    document.getElementById("preco").setAttribute("aria-label", trad.labelPreco);
    document.getElementById("label-desconto").innerText = trad.labelDesconto;
    document.getElementById("desconto").placeholder = trad.placeholderDesconto;
    document.getElementById("desconto").setAttribute("aria-label", trad.labelDesconto);
    document.getElementById("btnCalcular").innerText = trad.btnCalcular;
    document.getElementById("btnCalcular").setAttribute("aria-label", trad.btnCalcular);
    document.getElementById("btnLimpar").innerText = trad.btnLimpar;
    document.getElementById("btnLimpar").setAttribute("aria-label", trad.btnLimpar);

    const tituloSemIcone = trad.titulo.replace('🛒 ', '');
    document.title = tituloSemIcone;
    const metaTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
    if (metaTitle) metaTitle.setAttribute('content', tituloSemIcone);

    window.tradAtiva = trad;
    window.decimalSep = (1.1).toLocaleString(trad.locale).charAt(1);
}

aplicarIdioma();

document.getElementById("btnCalcular").addEventListener("click", calcular);
document.getElementById("btnLimpar").addEventListener("click", limparCampos);

function esconderResultado() {
    const caixaResultado = document.getElementById("resultado-box");
    const btnCalcular = document.getElementById("btnCalcular");
    const btnLimpar = document.getElementById("btnLimpar");

    if (caixaResultado.style.display === "block") {
        caixaResultado.style.display = "none";
        btnCalcular.style.display = "block";
        btnLimpar.style.display = "none";
    }
}

document.getElementById("preco").addEventListener("focus", esconderResultado);
document.getElementById("desconto").addEventListener("focus", esconderResultado);

function validarPreco(input) {
    if (!window.decimalSep) return;
    let valor = input.value;
    const sep = window.decimalSep;
    const outroSep = (sep === ',') ? '.' : ',';
    valor = valor.replace(new RegExp(`\\${outroSep}`, 'g'), sep);
    valor = valor.replace(new RegExp(`[^0-9\\${sep}]`, 'g'), '');
    const partes = valor.split(sep);
    if (partes.length > 2) {
        valor = partes[0] + sep + partes.slice(1).join('');
    }
    if (valor.startsWith(sep)) {
        valor = '0' + sep + valor.substring(1);
    }
    input.value = valor;
}

function validarDesconto(input) {
    // Permite números e o separador decimal local, sem símbolo de %
    if (!window.decimalSep) return;
    let val = input.value;
    const sep = window.decimalSep;
    const outroSep = (sep === ',') ? '.' : ',';
    val = val.replace(new RegExp(`\\${outroSep}`, 'g'), sep);
    val = val.replace(new RegExp(`[^0-9\\${sep}]`, 'g'), '');
    const primeiraVirgula = val.indexOf(sep);
    if (primeiraVirgula !== -1) {
        const antes = val.substring(0, primeiraVirgula + 1);
        const depois = val.substring(primeiraVirgula + 1).replace(new RegExp(`\\${sep}`, 'g'), '');
        val = antes + depois;
    }
    input.value = val;
}

function interpretarNumero(valorTexto) {
    const sep = window.decimalSep;
    let limpo = valorTexto.replace(new RegExp(`\\${sep}`, 'g'), '.').replace(/[^0-9.]/g, '');
    if (limpo === '' || limpo === '.') return NaN;
    return parseFloat(limpo);
}

function calcular() {
    const precoTexto = document.getElementById("preco").value.replace(window.decimalSep, '.');
    const descontoTexto = document.getElementById("desconto").value.trim();

    const preco = parseFloat(precoTexto);
    const desconto = interpretarNumero(descontoTexto);

    const caixaResultado = document.getElementById("resultado-box");
    const txtTitulo = document.getElementById("res-titulo");
    const txtValor = document.getElementById("res-valor");
    const txtPoupanca = document.getElementById("res-poupanca");
    const btnCalcular = document.getElementById("btnCalcular");
    const btnLimpar = document.getElementById("btnLimpar");

    const trad = window.tradAtiva;

    if (isNaN(preco) || isNaN(desconto) || preco < 0 || desconto < 0 || desconto > 100) {
        txtTitulo.innerText = trad.avisoTitulo;
        caixaResultado.style.display = "block";
        caixaResultado.style.background = "#fef2f2";
        caixaResultado.style.borderColor = "#ef4444";
        txtValor.style.color = "#991b1b";
        txtValor.style.fontSize = "22px";
        txtValor.innerText = trad.avisoTexto;
        txtPoupanca.innerText = "";
        return;
    }

    const precoFinal = preco * (1 - desconto / 100);
    const poupanca = preco - precoFinal;

    const formatoMoeda = new Intl.NumberFormat(trad.locale, {
        style: 'currency',
        currency: trad.moedaCodigo
    });

    txtTitulo.innerText = trad.resultadoTitulo;
    txtValor.style.color = "#047857";
    txtValor.style.fontSize = "40px";
    txtValor.innerText = formatoMoeda.format(precoFinal);
    txtPoupanca.innerText = `${trad.poupancaTexto}: ${formatoMoeda.format(poupanca)}`;

    caixaResultado.style.display = "block";
    caixaResultado.style.background = "#ecfdf5";
    caixaResultado.style.borderColor = "#10b981";

    btnCalcular.style.display = "none";
    btnLimpar.style.display = "block";
}

function limparCampos() {
    document.getElementById("preco").value = "";
    document.getElementById("desconto").value = "";

    document.getElementById("resultado-box").style.display = "none";

    document.getElementById("btnCalcular").style.display = "block";
    document.getElementById("btnLimpar").style.display = "none";

    document.getElementById("preco").focus();
}

if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
    navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Modo offline ativado com sucesso!"))
        .catch(err => console.log("Erro no Service Worker:", err));
}
